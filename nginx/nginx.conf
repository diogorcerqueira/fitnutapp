events {
  worker_connections 1024;
}

http {
  resolver 127.0.0.11 valid=30s ipv6=off;

  server {
    listen 8080;

    location /api/v1/auth/ {
      set $upstream http://auth-service:3001;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/users/ {
      set $upstream http://auth-service:3001;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/workouts/ {
      set $upstream http://workout-service:3002;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/exercises/ {
      set $upstream http://workout-service:3002;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/nutrition/ {
      set $upstream http://nutrition-service:3003;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/foods/ {
      set $upstream http://nutrition-service:3003;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/ai/ {
      set $upstream http://ai-service:3004;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/v1/notifications/ {
      set $upstream http://notification-service:3005;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /docs/auth/         { set $u http://auth-service:3001/api-docs/;         proxy_pass $u; }
    location /docs/workout/      { set $u http://workout-service:3002/api-docs/;       proxy_pass $u; }
    location /docs/nutrition/    { set $u http://nutrition-service:3003/api-docs/;     proxy_pass $u; }
    location /docs/ai/           { set $u http://ai-service:3004/docs;                 proxy_pass $u; }
    location /docs/notification/ { set $u http://notification-service:3005/api-docs/;  proxy_pass $u; }
  }
}
