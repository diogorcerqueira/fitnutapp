services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitness
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    ports:
      - "8081:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - workout-service
      - nutrition-service
      - ai-service
      - notification-service

  auth-service:
    build: ./auth-service
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fitness?schema=auth
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_DAYS: 7
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: http://localhost:8080/api/v1/auth/google/callback
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  workout-service:
    build: ./workout-service
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fitness?schema=workout
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      EXERCISEDB_API_KEY: ${EXERCISEDB_API_KEY}
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  nutrition-service:
    build: ./nutrition-service
    environment:
      PORT: 3003
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fitness?schema=nutrition
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      AUTH_SERVICE_URL: http://auth-service:3001
    ports:
      - "3003:3003"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  ai-service:
    build: ./ai-service
    environment:
      PORT: 3004
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/fitness
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "3004:3004"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  notification-service:
    build: ./notification-service
    environment:
      PORT: 3005
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      MAILTRAP_TOKEN: ${MAILTRAP_TOKEN}
      MAILTRAP_FROM_EMAIL: noreply@fitness-app.com
      MAILTRAP_FROM_NAME: FitnessApp
    ports:
      - "3005:3005"
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - nginx

volumes:
  postgres_data:
